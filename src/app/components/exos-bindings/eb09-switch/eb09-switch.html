<h3>EB09 — &#64;switch / &#64;case / &#64;default</h3>

<label>
    Role :
    <select [(ngModel)]="role" name="role">
        <option value="admin">admin</option>
        <option value="user">user</option>
        <option value="guest">guest</option>
        <option value="autre">autre</option>
    </select>
</label>

@switch (role) {
    @case ('admin') {
        <div class="bandeau admin">Acces total — vous pouvez tout faire.</div>
    }
    @case ('user') {
        <div class="bandeau user">Acces limite — fonctions standards.</div>
    }
    @case ('guest') {
        <div class="bandeau guest">Lecture seule.</div>
    }
    @default {
        <div class="bandeau inconnu">Role inconnu.</div>
    }
}
